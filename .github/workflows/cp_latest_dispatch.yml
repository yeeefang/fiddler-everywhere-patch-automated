name: Latest Version - Workflow Dispatch

on:
  workflow_dispatch:
    inputs:
      os-and-arch:
        description: 'Operating System And Architecture'
        required: true
        default: 'Windows (x86_64)'
        type: choice
        options:
          - Windows (x86_64)
          - Linux (x86_64)
          - Mac (arm64)
      patch-server-port:
        description: 'Patch server port (useful for resolving port conflicts)'
        required: true
        default: '5678'
      patch-user-email:
        description: 'Fake registered email (for fake FE account)'
        required: true
        default: 'long@telerik.com'
      patch-user-firstName:
        description: 'Fake registered first name (for fake FE account)'
        required: true
        default: 'Long'
      patch-user-lastName:
        description: 'Fake registered last name (for fake FE account)'
        required: true
        default: 'Wang'
      patch-user-country-code:
        description: 'Fake registered country code (for fake FE account) ; Ex: 86'
        required: true
        default: '86'
      patch-user-provider:
        description: 'Fake registered provider (for fake FE account) ; Ex: Google'
        required: true
        default: 'Google'

defaults:
  run:
    shell: pwsh

env:
  OS_ARCH: ${{ github.event.inputs.os-and-arch }}
  PATCH_SERVER_PORT: ${{ github.event.inputs.patch-server-port }}
  PATCH_USER_EMAIL: ${{ github.event.inputs.patch-user-email }}
  PATCH_USER_FNAME: ${{ github.event.inputs.patch-user-firstName }}
  PATCH_USER_LNAME: ${{ github.event.inputs.patch-user-lastName }}
  PATCH_USER_COUNTRYCODE: ${{ github.event.inputs.patch-user-country-code }}
  PATCH_USER_PROVIDER: ${{ github.event.inputs.patch-user-provider }}

jobs:
  init_os_arch:
    runs-on: ubuntu-latest
    outputs:
      library_extension: ${{ steps.set_platform_metadata.outputs.library_extension }}
      arch_code: ${{ steps.set_platform_metadata.outputs.arch_code }}
      yui_asset_basename: ${{ steps.set_platform_metadata.outputs.yui_asset_basename }}

    steps:
      - name: Set platform metadata
        id: set_platform_metadata
        run: |
          switch ($env:OS_ARCH) {
            'Windows (x86_64)' {
              $extension = 'dll'
              $arch = 'win32-x86_64'
              $yuiAssetBaseName = 'fiddler'
            }
            'Linux (x86_64)' {
              $extension = 'so'
              $arch = 'linux-x86_64'
              $yuiAssetBaseName = 'libfiddler'
            }
            'Mac (arm64)' {
              $extension = 'dylib'
              $arch = 'mac-arm64'
              $yuiAssetBaseName = 'fiddler'
            }
            default {
              throw "Unsupported OS architecture: $env:OS_ARCH"
            }
          }

          "library_extension=$extension" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "arch_code=$arch" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "yui_asset_basename=$yuiAssetBaseName" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

  scrape_fe_version:
    runs-on: ubuntu-latest
    outputs:
      scraped_version: ${{ steps.get_version.outputs.scraped_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Run the Powershell script
        id: get_version
        working-directory: utils/fe-version-scraper
        run: ./GetLatest-FEVersion.ps1

  download-Yui-patch:
    runs-on: ubuntu-latest
    needs:
      - scrape_fe_version
      - init_os_arch

    env:
      SCRAPED_VERSION: ${{ needs.scrape_fe_version.outputs.scraped_version }}
      LIBRARY_EXTENSION: ${{ needs.init_os_arch.outputs.library_extension }}
      ARCH_CODE: ${{ needs.init_os_arch.outputs.arch_code }}
      YUI_ASSET_BASENAME: ${{ needs.init_os_arch.outputs.yui_asset_basename }}

    steps:
      - name: Prepare Yui metadata
        run: |
          $release = 'continuous'
          $fileName = "yui-$env:YUI_ASSET_BASENAME-$env:ARCH_CODE-$release.$env:LIBRARY_EXTENSION"

          "YUI_RELEASE=$release" | Out-File -Append -FilePath $env:GITHUB_ENV
          "YUI_ASSET_FILE_NAME=$fileName" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Create Yui directory
        run: |
          if (-not (Test-Path "Yui")) {
            New-Item -ItemType Directory -Path "Yui" | Out-Null
          }

      - name: Download Yui Patch
        run: |
          $yuiFiddlerUrl = "https://github.com/project-yui/Yui-patch/releases/download/$env:YUI_RELEASE/$env:YUI_ASSET_FILE_NAME"

          Write-Host "Downloading Yui patch from $yuiFiddlerUrl"
          Invoke-WebRequest -Uri $yuiFiddlerUrl -OutFile "Yui/$env:YUI_ASSET_FILE_NAME"

      - name: Upload Yui folder as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yui-patch
          path: Yui/
          if-no-files-found: error

  download-msojocs-server:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Git
        run: |
          git init
          git remote add origin https://github.com/msojocs/fiddler-everywhere-enhance.git
          git config core.sparseCheckout true

      - name: Configure sparse-checkout to download the server directory
        run: |
          Set-Content -Path ".git/info/sparse-checkout" -Value "server"
          git pull origin main

      - name: Move the downloaded directory to the target folder
        run: |
          New-Item -ItemType Directory -Path "msojocs" -Force | Out-Null
          Move-Item -Path "server" -Destination "msojocs/"

      - name: List files in the msojocs/server directory
        run: Get-ChildItem -Path msojocs\server

      - name: Upload msojocs folder as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs/
          if-no-files-found: error

  download-fiddler-everywhere-windows:
    if: ${{ github.event.inputs.os-and-arch == 'Windows (x86_64)' }}
    runs-on: ubuntu-latest
    needs:
      - scrape_fe_version

    steps:
      - name: Build URL & Download
        run: |
          $scrapedVersion = "${{ needs.scrape_fe_version.outputs.scraped_version }}"

          if (-not [string]::IsNullOrEmpty($scrapedVersion)) {
            $downloadUrl = "https://downloads.getfiddler.com/win/Fiddler%20Everywhere%20$scrapedVersion.exe"

            Write-Host "Download URL: $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile "FiddlerEverywhereSetup.exe"
          } else {
            throw "SCRAPED_VERSION is empty or not set"
          }

      - name: Extract exe
        run: 7z x "FiddlerEverywhereSetup.exe" -ofe_extracted

      - name: Extract app
        run: 7z x "fe_extracted/`$PLUGINSDIR/app-64.7z" -ofe_app

      - name: Upload Fiddler Everywhere extracted folder as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          if-no-files-found: error

  download-fiddler-everywhere-linux:
    if: ${{ github.event.inputs.os-and-arch == 'Linux (x86_64)' }}
    runs-on: ubuntu-latest
    needs:
      - scrape_fe_version

    steps:
      - name: Build URL & Download
        run: |
          $scrapedVersion = "${{ needs.scrape_fe_version.outputs.scraped_version }}"

          if (-not [string]::IsNullOrEmpty($scrapedVersion)) {
            $downloadUrl = "https://downloads.getfiddler.com/linux/fiddler-everywhere-$scrapedVersion.AppImage"

            Write-Host "Download URL: $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile "FiddlerEverywhereSetup.AppImage"
          } else {
            throw "SCRAPED_VERSION is empty or not set"
          }

      - name: Extract AppImage
        run: |
          chmod +x ./FiddlerEverywhereSetup.AppImage
          ./FiddlerEverywhereSetup.AppImage --appimage-extract

      - name: Rename squashfs-root to fe_app
        run: mv squashfs-root fe_app

      - name: Upload Fiddler Everywhere extracted folder as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/
          if-no-files-found: error

  patch_fe:
    runs-on: windows-latest
    needs:
      - download-Yui-patch
      - download-msojocs-server
      - scrape_fe_version
      - download-fiddler-everywhere-windows
      - download-fiddler-everywhere-linux
    if: ${{ always() && github.event.inputs.os-and-arch != 'Mac (arm64)' && needs.scrape_fe_version.result == 'success' && needs.download-Yui-patch.result == 'success' && needs.download-msojocs-server.result == 'success' && (needs.download-fiddler-everywhere-windows.result == 'success' || needs.download-fiddler-everywhere-linux.result == 'success') }}

    env:
      SCRAPED_VERSION: ${{ needs.scrape_fe_version.outputs.scraped_version }}

    outputs:
      patched-fe-name: ${{ steps.rename-fe.outputs.patched-fe-name }}

    steps:
      - name: Download Yui patch
        uses: actions/download-artifact@v4
        with:
          name: Yui-patch
          path: Yui-patch

      - name: Download msojocs server
        uses: actions/download-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs-patch

      - name: Download FE
        uses: actions/download-artifact@v4
        with:
          name: fe_app
          path: fe_app

      - name: List the contents of the downloaded artifacts
        run: |
          Get-ChildItem -Recurse Yui-patch
          Get-ChildItem -Recurse msojocs-patch
          Get-ChildItem -Recurse fe_app

      - name: Rename main FE folder
        run: Rename-Item -Path "fe_app" -NewName "FE"

      - name: Patch shared library
        run: |
          $originalFiddler = @(
            "FE/fiddler.dll",
            "FE/libfiddler.dll",
            "FE/libfiddler.so"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          $yuiFiddler = Get-ChildItem -Path "Yui-patch" -Recurse -File | Select-Object -First 1

          if (-not $originalFiddler) {
            throw "Could not find the target Fiddler shared library in FE."
          }

          if (-not $yuiFiddler) {
            throw "Could not find the downloaded Yui patch library."
          }

          Copy-Item -Path $yuiFiddler.FullName -Destination $originalFiddler -Force
          Write-Host "Replaced $originalFiddler with $($yuiFiddler.FullName)"

      - name: Clean Yui-patch
        run: |
          if (Test-Path Yui-patch) {
            Remove-Item -Path "Yui-patch" -Recurse
          }

      - name: Copy server folder
        run: |
          $sourceServerFolder = "msojocs-patch/server/file"
          $destinationServerFolder = "FE/resources/app/out"

          if (-not (Test-Path $sourceServerFolder)) {
            throw "Source server folder not found: $sourceServerFolder"
          }

          if (-not (Test-Path $destinationServerFolder)) {
            throw "Destination server folder not found: $destinationServerFolder"
          }

          Copy-Item -Path $sourceServerFolder -Destination $destinationServerFolder -Recurse

      - name: Set patch server port
        run: |
          $sourceIndex = "msojocs-patch/server/index.js"

          if (-not (Test-Path $sourceIndex)) {
            throw "Server index.js not found: $sourceIndex"
          }

          $indexContent = Get-Content -Path $sourceIndex -Raw
          $indexContent = $indexContent -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content -Path $sourceIndex -Value $indexContent

      - name: Set user credentials
        run: |
          $sourceJson = "FE/resources/app/out/file/identity.getfiddler.com/oauth/token.json"

          if (-not (Test-Path $sourceJson)) {
            throw "token.json not found: $sourceJson"
          }

          $tokenContent = Get-Content -Path $sourceJson -Raw | ConvertFrom-Json

          $tokenContent.user_info.email = $env:PATCH_USER_EMAIL
          $tokenContent.user_info.firstName = $env:PATCH_USER_FNAME
          $tokenContent.user_info.lastName = $env:PATCH_USER_LNAME
          $tokenContent.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $tokenContent.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER

          $tokenContent | ConvertTo-Json -Depth 5 | Set-Content -Path $sourceJson

      - name: Patch main.js to main.original.js
        run: |
          $sourceMain = "FE/resources/app/out/main.js"
          $newMain = "FE/resources/app/out/main.original.js"
          $sourceIndex = "msojocs-patch/server/index.js"

          if (-not (Test-Path $sourceMain)) {
            throw "main.js not found: $sourceMain"
          }

          if (-not (Test-Path $sourceIndex)) {
            throw "Server index.js not found: $sourceIndex"
          }

          $mainContent = Get-Content -Path $sourceMain -Raw
          $indexContent = Get-Content -Path $sourceIndex -Raw

          Copy-Item -Path $sourceMain -Destination $newMain
          Set-Content -Path $sourceMain -Value ($indexContent + $mainContent)

      - name: Clean msojocs-patch
        run: |
          if (Test-Path msojocs-patch) {
            Remove-Item -Path "msojocs-patch" -Recurse
          }

      - name: Rename FE
        id: rename-fe
        run: |
          if (-not (Test-Path FE)) {
            throw "FE folder not found after patching."
          }

          $newName = "Fiddler-Everywhere-V$env:SCRAPED_VERSION-Patched"
          Rename-Item -Path "FE" -NewName $newName

          "patched-fe-name=$newName" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Upload artifact for patched FE
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.rename-fe.outputs.patched-fe-name }}"
          path: "${{ steps.rename-fe.outputs.patched-fe-name }}/"
          if-no-files-found: error

  patch_fe_mac:
    runs-on: macos-latest
    needs:
      - download-Yui-patch
      - download-msojocs-server
      - scrape_fe_version
    if: ${{ always() && github.event.inputs.os-and-arch == 'Mac (arm64)' && needs.scrape_fe_version.result == 'success' && needs.download-Yui-patch.result == 'success' && needs.download-msojocs-server.result == 'success' }}

    env:
      SCRAPED_VERSION: ${{ needs.scrape_fe_version.outputs.scraped_version }}

    outputs:
      patched-fe-name: ${{ steps.package-fe.outputs.patched-fe-name }}

    steps:
      - name: Download Yui patch
        uses: actions/download-artifact@v4
        with:
          name: Yui-patch
          path: Yui-patch

      - name: Download msojocs server
        uses: actions/download-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs-patch

      - name: Download FE DMG
        run: |
          if (-not [string]::IsNullOrEmpty($env:SCRAPED_VERSION)) {
            $downloadUrl = "https://downloads.getfiddler.com/mac-arm64/Fiddler%20Everywhere%20$env:SCRAPED_VERSION.dmg"

            Write-Host "Download URL: $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile "FiddlerEverywhereSetup.dmg"
          } else {
            throw "SCRAPED_VERSION is empty or not set"
          }

      - name: Extract app bundle from DMG
        id: extract-fe
        run: |
          New-Item -ItemType Directory -Path "FE" -Force | Out-Null
          $mountRoot = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { (Resolve-Path ".").Path }
          $mountPoint = Join-Path $mountRoot "fe_mount_$([guid]::NewGuid().ToString('N'))"
          New-Item -ItemType Directory -Path $mountPoint -Force | Out-Null
          'Y' | hdiutil attach "FiddlerEverywhereSetup.dmg" -mountpoint $mountPoint -nobrowse

          try {
            $appBundle = Get-ChildItem -Path $mountPoint -Filter "*.app" | Select-Object -First 1

            if (-not $appBundle) {
              throw "Could not find a macOS .app bundle inside the mounted DMG."
            }

            $destinationApp = Join-Path "FE" $appBundle.Name
            ditto $appBundle.FullName $destinationApp

            "app_bundle_name=$($appBundle.Name)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          } finally {
            $appBundle = $null
            Start-Sleep -Seconds 2

            $detached = $false
            for ($attempt = 1; $attempt -le 5 -and -not $detached; $attempt++) {
              hdiutil detach $mountPoint
              if ($LASTEXITCODE -eq 0) {
                $detached = $true
              } else {
                Write-Warning "Detach attempt $attempt failed for $mountPoint; retrying..."
                Start-Sleep -Seconds 2
              }
            }

            if (-not $detached) {
              Write-Warning "Falling back to forced detach for $mountPoint"
              hdiutil detach $mountPoint -force
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to detach DMG mount point: $mountPoint"
              }
            }

            if (Test-Path $mountPoint) {
              Remove-Item -Path $mountPoint -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Patch macOS shared library
        run: |
          $appBundlePath = Join-Path "FE" "${{ steps.extract-fe.outputs.app_bundle_name }}"
          $frameworksDir = Join-Path $appBundlePath "Contents/Frameworks"

          $originalFiddler = Get-ChildItem -Path $frameworksDir -File |
            Where-Object { $_.Name -in @('libfiddler.dylib', 'fiddler.dylib') } |
            Select-Object -First 1
          $yuiFiddler = Get-ChildItem -Path "Yui-patch" -Recurse -File | Select-Object -First 1

          if (-not $originalFiddler) {
            throw "Could not find the target Fiddler dylib in $frameworksDir"
          }

          if (-not $yuiFiddler) {
            throw "Could not find the downloaded Yui patch library."
          }

          Copy-Item -Path $yuiFiddler.FullName -Destination $originalFiddler.FullName -Force
          Write-Host "Replaced $($originalFiddler.FullName) with $($yuiFiddler.FullName)"

      - name: Clean Yui-patch
        run: |
          if (Test-Path Yui-patch) {
            Remove-Item -Path "Yui-patch" -Recurse
          }

      - name: Set patch server port
        run: |
          $sourceIndex = "msojocs-patch/server/index.js"

          if (-not (Test-Path $sourceIndex)) {
            throw "Server index.js not found: $sourceIndex"
          }

          $indexContent = Get-Content -Path $sourceIndex -Raw
          $indexContent = $indexContent -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content -Path $sourceIndex -Value $indexContent

      - name: Copy server folder
        run: |
          $appBundlePath = Join-Path "FE" "${{ steps.extract-fe.outputs.app_bundle_name }}"
          $appOutDir = Join-Path $appBundlePath "Contents/Resources/app/out"
          $sourceServerFolder = "msojocs-patch/server/file"

          if (-not (Test-Path $sourceServerFolder)) {
            throw "Source server folder not found: $sourceServerFolder"
          }

          if (-not (Test-Path $appOutDir)) {
            throw "App out directory not found: $appOutDir"
          }

          Copy-Item -Path $sourceServerFolder -Destination $appOutDir -Recurse

      - name: Set user credentials
        run: |
          $appBundlePath = Join-Path "FE" "${{ steps.extract-fe.outputs.app_bundle_name }}"
          $sourceJson = Join-Path $appBundlePath "Contents/Resources/app/out/file/identity.getfiddler.com/oauth/token.json"

          if (-not (Test-Path $sourceJson)) {
            throw "token.json not found: $sourceJson"
          }

          $tokenContent = Get-Content -Path $sourceJson -Raw | ConvertFrom-Json

          $tokenContent.user_info.email = $env:PATCH_USER_EMAIL
          $tokenContent.user_info.firstName = $env:PATCH_USER_FNAME
          $tokenContent.user_info.lastName = $env:PATCH_USER_LNAME
          $tokenContent.user_info.country = $env:PATCH_USER_COUNTRYCODE
          $tokenContent.user_info.identities[0].providerName = $env:PATCH_USER_PROVIDER

          $tokenContent | ConvertTo-Json -Depth 5 | Set-Content -Path $sourceJson

      - name: Patch main.js to main.original.js
        run: |
          $appBundlePath = Join-Path "FE" "${{ steps.extract-fe.outputs.app_bundle_name }}"
          $sourceMain = Join-Path $appBundlePath "Contents/Resources/app/out/main.js"
          $newMain = Join-Path $appBundlePath "Contents/Resources/app/out/main.original.js"
          $sourceIndex = "msojocs-patch/server/index.js"

          if (-not (Test-Path $sourceMain)) {
            throw "main.js not found: $sourceMain"
          }

          if (-not (Test-Path $sourceIndex)) {
            throw "Server index.js not found: $sourceIndex"
          }

          $mainContent = Get-Content -Path $sourceMain -Raw
          $indexContent = Get-Content -Path $sourceIndex -Raw

          Copy-Item -Path $sourceMain -Destination $newMain
          Set-Content -Path $sourceMain -Value ($indexContent + $mainContent)

      - name: Re-sign patched app bundle
        run: |
          $appBundlePath = Join-Path (Resolve-Path "FE").Path "${{ steps.extract-fe.outputs.app_bundle_name }}"

          xattr -cr $appBundlePath
          codesign --force --deep --sign - $appBundlePath

      - name: Package patched app bundle
        id: package-fe
        run: |
          $appBundlePath = Join-Path (Resolve-Path "FE").Path "${{ steps.extract-fe.outputs.app_bundle_name }}"

          if (-not (Test-Path $appBundlePath)) {
            throw "Patched app bundle not found: $appBundlePath"
          }

          $newName = "Fiddler-Everywhere-V$env:SCRAPED_VERSION-Patched-macOS-arm64"
          Rename-Item -Path $appBundlePath -NewName "$newName.app"

          $archiveName = "$newName.tar.gz"
          tar -czf $archiveName -C FE "$newName.app"

          "patched-fe-name=$newName" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "patched-fe-archive=$archiveName" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Upload artifact for patched FE
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.package-fe.outputs.patched-fe-name }}"
          path: "${{ steps.package-fe.outputs.patched-fe-archive }}"
          if-no-files-found: error
